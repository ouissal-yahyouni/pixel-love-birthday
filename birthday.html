<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #120018;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  .page {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 40px;
  }

  /* CARD */

  .glow-card {
    position: relative;
    z-index: 10;
    width: 420px;
    padding: 40px;
    border-radius: 25px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(15px);
    border: 2px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 0 40px rgba(255, 0, 255, 0.4);
    text-align: center;
    color: white;
  }

  .pixel-title {
    font-size: 40px;
    color: #ff66d9;
    text-shadow:
      0 0 10px #ff66d9,
      0 0 20px #ff00ff,
      0 0 40px #ff00ff;
  }

  .glow-card p {
    font-size: 18px;
    line-height: 1.7;
    color: #ffe8ff;
  }

  .glow-card h2 {
    color: #ff9cf5;
    text-shadow: 0 0 15px #ff00ff;
  }

  /* CUBE */

  .cube {
    --size: 200px;

    position: relative;
    width: var(--size);
    height: var(--size);

    transform-style: preserve-3d;
    animation: girar 10s linear infinite;
  }

  .cube .side {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #ff00ff55;
    border: 2px solid #ff66ff;
    box-shadow: 0 0 20px #ff00ff inset;
  }

  /* FRONT */
  .cube .front {
    transform: translateZ(calc(var(--size) / 2));
  }

  /* BACK */
  .cube .behind {
    transform: rotateY(180deg) translateZ(calc(var(--size) / 2));
  }

  /* RIGHT */
  .cube .right {
    transform: rotateY(90deg) translateZ(calc(var(--size) / 2));
  }

  /* LEFT */
  .cube .left {
    transform: rotateY(-90deg) translateZ(calc(var(--size) / 2));
  }

  /* TOP */
  .cube .top {
    transform: rotateX(90deg) translateZ(calc(var(--size) / 2));
  }

  /* BOTTOM */
  .cube .under {
    transform: rotateX(-90deg) translateZ(calc(var(--size) / 2));
  }

  /* HEART CENTER */

  .circle-center {
    position: absolute;
    width: 90px;
    height: 90px;
    background: white;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  /* HEART */

  .heart-container {
    position: absolute;
    width: 50px;
    height: 50px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-45deg);
  }

  .heart-container::before,
  .heart-container::after {
    content: "";
    position: absolute;
    width: 50px;
    height: 50px;
    background: #ff00aa;
    border-radius: 50%;
  }

  .heart-container::before {
    top: -25px;
    left: 0;
  }

  .heart-container::after {
    top: 0;
    left: 25px;
  }

  .heart-container {
    background: #ff00aa;
  }

  /* GRID LINES */

  .line {
    position: absolute;
    background: #ff00ff;
  }

  .vertical-line {
    width: 4px;
    height: 100%;
    left: 50%;
    transform: translateX(-50%);
  }

  .horizontal-line {
    width: 100%;
    height: 4px;
    top: 50%;
    transform: translateY(-50%);
  }

  /* VIEWPORT */

  .cube-viewport {
    position: absolute;
    inset: 0;
    z-index: -1;
    background:
      linear-gradient(rgba(255, 0, 255, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 0, 255, 0.05) 1px, transparent 1px);

    background-size: 40px 40px;
  }

  /* ANIMATION */

  @keyframes girar {
    0% {
      transform: rotateX(-20deg) rotateY(0deg);
    }

    100% {
      transform: rotateX(-20deg) rotateY(360deg);
    }
  }
  

</style>
